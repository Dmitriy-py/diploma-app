name: CI/CD Diploma App

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and Push Docker Image
        env:
          IMAGE_NAME: "cr.yandex/crpil6qbhst9ijov98qr/nginx-app:latest"
        run: |
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Create Registry Secret in K8s
        run: |
          kubectl create secret docker-registry regcred \
            --docker-server=cr.yandex \
            --docker-username=json_key \
            --docker-password='${{ secrets.YC_SA_JSON_CREDENTIALS }}' \
            --docker-email=unused \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to K8s
        run: |
          kubectl apply --insecure-skip-tls-verify=true -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx-app
            namespace: default
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: nginx-app
            template:
              metadata:
                labels:
                  app: nginx-app
              spec:
                imagePullSecrets:
                - name: regcred
                containers:
                - name: nginx
                  image: cr.yandex/crpil6qbhst9ijov98qr/nginx-app:latest
                  ports:
                  - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: nginx-service
            namespace: default
          spec:
            type: ClusterIP
            selector:
              app: nginx-app
            ports:
              - port: 80
                targetPort: 80
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: nginx-ingress
            namespace: default
            annotations:
              kubernetes.io/ingress.class: nginx
          spec:
            rules:
            - host: myapp.93.77.180.95.nip.io
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: nginx-service
                      port:
                        number: 80
          EOF

          kubectl rollout restart deployment/nginx-app -n default
